<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEP Style Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a1625;
      --panel-bg: #2d2640;
      --text-main: #ffffff;
      --text-dark: #333333;
      --primary: #8b5cf6;
      --opt-1: #ff4757; /* Red */
      --opt-2: #1e90ff; /* Blue */
      --opt-3: #ffa502; /* Yellow */
      --opt-4: #2ed573; /* Green */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Kanit', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(255, 71, 87, 0.1) 0%, transparent 50%);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .q-counter {
      font-size: 1.2rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 20px;
      border-radius: 20px;
    }

    .score-display {
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffd32a;
    }

    /* Timer Bar */
    .timer-container {
      width: 100%;
      height: 8px;
      background: #333;
    }

    .timer-bar {
      height: 100%;
      width: 100%;
      background: #2ed573;
      transition: width 1s linear, background-color 0.3s;
    }

    /* Game Area */
    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      padding: 20px;
    }

    /* Question Bubble */
    .question-wrapper {
      flex: 0.4;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 20px;
      z-index: 5;
    }

    .question-bubble {
      background: #ffffff;
      color: var(--text-dark);
      padding: 30px 40px;
      border-radius: 30px;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
      animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    /* Speech bubble tail */
    .question-bubble::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 20px 20px 0;
      border-style: solid;
      border-color: #ffffff transparent transparent transparent;
      display: block;
      width: 0;
    }

    /* Avatar Area (Stage) */
    .stage-area {
      flex: 0.2;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 20px;
    }

    .player-avatar {
      font-size: 4rem;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 10;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.4));
      animation: idleBounce 2s infinite ease-in-out;
    }

    /* Options Area (Floor) */
    .options-area {
      flex: 0.4;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 15px;
      padding: 0 10px 20px 10px;
    }

    .opt-card {
      border-radius: 20px;
      border: none;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.2);
      transition: transform 0.1s, filter 0.2s;
    }

    .opt-card:active {
      transform: translateY(4px);
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.2);
    }

    .opt-card.disabled {
      cursor: not-allowed;
      filter: brightness(0.6) grayscale(0.5);
    }

    .opt-card.correct-ans {
      animation: pulseWin 1s infinite;
      z-index: 10;
    }

    .opt-card.wrong-ans {
      opacity: 0.3;
    }

    .bg-red { background-color: var(--opt-1); }
    .bg-blue { background-color: var(--opt-2); }
    .bg-yellow { background-color: var(--opt-3); }
    .bg-green { background-color: var(--opt-4); }

    /* Overlay Screens */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(26, 22, 37, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(5px);
    }

    .logo-img {
      font-size: 6rem;
      margin-bottom: 20px;
      animation: float 3s infinite ease-in-out;
    }

    .title-text {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(to right, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn-main {
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 20px 60px;
      border-radius: 50px;
      font-size: 2rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 0 #6d28d9, 0 20px 30px rgba(109, 40, 217, 0.4);
      transition: all 0.2s;
    }

    .btn-main:active {
      transform: translateY(10px);
      box-shadow: 0 0px 0 #6d28d9, 0 10px 15px rgba(109, 40, 217, 0.4);
    }

    /* Result Screen Specific */
    .result-box {
      background: #2d2640;
      padding: 50px;
      border-radius: 30px;
      text-align: center;
      border: 4px solid #8b5cf6;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .medal {
      font-size: 5rem;
      margin-bottom: 10px;
    }

    /* Animations */
    @keyframes bounceIn {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes idleBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }

    @keyframes pulseWin {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
    }

    .hidden { display: none !important; }

    @media (min-width: 768px) {
      .options-area {
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: 1fr;
        flex: 0.3;
        gap: 20px;
        padding: 0 40px 40px 40px;
      }
      .question-bubble {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Start Screen -->
  <div id="start-screen" class="overlay">
    <div class="logo-img">🎮</div>
    <div class="title-text">ZEP Style Quiz</div>
    <button class="btn-main" onclick="startGame()">ENTER GAME</button>
  </div>

  <!-- Main Game UI -->
  <div class="top-bar">
    <div class="q-counter">Q <span id="current-q">1</span>/<span id="total-q">5</span></div>
    <div class="score-display">⭐ <span id="score">0</span></div>
  </div>

  <div class="timer-container">
    <div class="timer-bar" id="timer-bar"></div>
  </div>

  <div class="game-area">
    <!-- Question -->
    <div class="question-wrapper">
      <div class="question-bubble" id="question-text">
        Ready?
      </div>
    </div>

    <!-- Character / Stage -->
    <div class="stage-area" id="stage">
      <div class="player-avatar" id="avatar">🦊</div>
    </div>

    <!-- Options -->
    <div class="options-area">
      <button class="opt-card bg-red" onclick="selectOption(0)" id="opt-0">Option 1</button>
      <button class="opt-card bg-blue" onclick="selectOption(1)" id="opt-1">Option 2</button>
      <button class="opt-card bg-yellow" onclick="selectOption(2)" id="opt-2">Option 3</button>
      <button class="opt-card bg-green" onclick="selectOption(3)" id="opt-3">Option 4</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="overlay hidden">
    <div class="result-box">
      <div class="medal">🏆</div>
      <h2 style="font-size: 2.5rem; margin-bottom: 20px; color: white;">Game Clear!</h2>
      <p style="font-size: 1.5rem; color: #a8b1c2; margin-bottom: 10px;">Total Score</p>
      <div style="font-size: 4rem; font-weight: 800; color: #ffd32a; margin-bottom: 30px;" id="final-score">0</div>
      <button class="btn-main" style="font-size: 1.5rem; padding: 15px 40px;" onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const quizData = [
      { q: "สัตว์ชนิดใดร้อง 'เมี้ยว' ?", opts: ["สุนัข", "แมว", "หมู", "ไก่"], ans: 1 },
      { q: "เมืองหลวงของประเทศไทยคืออะไร?", opts: ["เชียงใหม่", "พัทยา", "กรุงเทพฯ", "ภูเก็ต"], ans: 2 },
      { q: "5 x 5 เท่ากับเท่าไร?", opts: ["10", "15", "20", "25"], ans: 3 },
      { q: "สีแดงผสมสีเหลืองจะได้สีอะไร?", opts: ["สีส้ม", "สีเขียว", "สีม่วง", "สีชมพู"], ans: 0 },
      { q: "ดาวเคราะห์ใดใกล้ดวงอาทิตย์ที่สุด?", opts: ["ดาวศุกร์", "ดาวพุธ", "โลก", "ดาวอังคาร"], ans: 1 }
    ];

    let currentQ = 0;
    let score = 0;
    let timeLimit = 15;
    let timeLeft = timeLimit;
    let timerInterval;
    let isAnswering = false;

    const els = {
      start: document.getElementById('start-screen'),
      result: document.getElementById('result-screen'),
      qText: document.getElementById('question-text'),
      curQ: document.getElementById('current-q'),
      totQ: document.getElementById('total-q'),
      score: document.getElementById('score'),
      finalScore: document.getElementById('final-score'),
      timerBar: document.getElementById('timer-bar'),
      avatar: document.getElementById('avatar'),
      opts: [
        document.getElementById('opt-0'),
        document.getElementById('opt-1'),
        document.getElementById('opt-2'),
        document.getElementById('opt-3')
      ]
    };

    els.totQ.innerText = quizData.length;

    function startGame() {
      els.start.classList.add('hidden');
      loadQuestion();
    }

    function loadQuestion() {
      isAnswering = false;
      timeLeft = timeLimit;
      
      // Reset Timer Bar
      els.timerBar.style.transition = 'none';
      els.timerBar.style.width = '100%';
      els.timerBar.style.backgroundColor = '#2ed573';
      
      // Force reflow
      void els.timerBar.offsetWidth;
      
      els.timerBar.style.transition = 'width 1s linear, background-color 0.3s';

      const data = quizData[currentQ];
      els.curQ.innerText = currentQ + 1;
      
      // Animation for question
      els.qText.style.animation = 'none';
      void els.qText.offsetWidth;
      els.qText.style.animation = 'bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
      els.qText.innerText = data.q;

      // Reset Avatar position
      els.avatar.style.left = '50%';
      els.avatar.style.bottom = '20px';
      els.avatar.innerText = ['🦊','🐰','🐻','🐼','🐯'][Math.floor(Math.random()*5)];

      // Reset Buttons
      els.opts.forEach((btn, idx) => {
        btn.innerText = data.opts[idx];
        btn.classList.remove('disabled', 'correct-ans', 'wrong-ans');
      });

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        const pct = (timeLeft / timeLimit) * 100;
        els.timerBar.style.width = pct + '%';

        if (pct <= 30) {
          els.timerBar.style.backgroundColor = '#ff4757';
        } else if (pct <= 60) {
          els.timerBar.style.backgroundColor = '#ffa502';
        }

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          handleTimeOut();
        }
      }, 1000);
    }

    function selectOption(idx) {
      if (isAnswering) return;
      isAnswering = true;
      clearInterval(timerInterval);

      // Move Avatar to chosen option visually
      const btnRect = els.opts[idx].getBoundingClientRect();
      const stageRect = document.getElementById('stage').getBoundingClientRect();
      
      const targetX = btnRect.left + (btnRect.width / 2) - stageRect.left;
      els.avatar.style.left = targetX + 'px';
      els.avatar.style.bottom = '-40px'; // Move down towards buttons
      
      // Play jump sound (dummy)
      playSound('jump');

      setTimeout(() => {
        revealAnswer(idx);
      }, 600); // Wait for avatar to land
    }

    function handleTimeOut() {
      isAnswering = true;
      revealAnswer(-1); // -1 means no answer
    }

    function revealAnswer(selectedIndex) {
      const correctIdx = quizData[currentQ].ans;

      els.opts.forEach((btn, idx) => {
        btn.classList.add('disabled');
        if (idx === correctIdx) {
          btn.classList.add('correct-ans');
          btn.classList.remove('disabled');
        } else {
          btn.classList.add('wrong-ans');
        }
      });

      if (selectedIndex === correctIdx) {
        // Correct
        els.avatar.innerText = '🤩';
        els.avatar.style.transform = 'translateX(-50%) translateY(-30px) scale(1.2)';
        score += (100 + timeLeft * 10);
        els.score.innerText = score;
        playSound('correct');
      } else {
        // Wrong or Timeout
        els.avatar.innerText = '😵';
        playSound('wrong');
      }

      setTimeout(() => {
        currentQ++;
        if (currentQ < quizData.length) {
          loadQuestion();
        } else {
          showResult();
        }
      }, 2500);
    }

    function showResult() {
      els.result.classList.remove('hidden');
      els.finalScore.innerText = score;
      if(score > 3000) els.avatar.innerText = '👑';
    }

    function playSound(type) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'correct') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(300, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'jump') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(300, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        }
      } catch(e) {}
    }
  </script>
</body>
</html>
